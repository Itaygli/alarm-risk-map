services:
  - type: web
    name: israel-alarm-risk-map
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: GOOGLE_CLIENT_ID
        sync: false                  # Fill in Render dashboard after creating OAuth app
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
